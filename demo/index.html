<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <title>FrontWave Map</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: system-ui, sans-serif;
      overflow: hidden;
      height: 100vh;
    }

    #map-container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #map {
      position: absolute;
      inset: 0;
      display: block;
      width: 100vw;
      height: 100vh;
      cursor: crosshair;
      touch-action: none;
      z-index: 1;
    }

    #top-left-controls {
      position: absolute;
      top: 12px;
      left: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 10;
    }

    #mode-buttons {
      display: flex;
      gap: 6px;
    }

    .mode-btn {
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid #475569;
      background: rgba(15, 23, 42, 0.85);
      color: #94a3b8;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .mode-btn:hover { background: rgba(51, 65, 85, 0.9); color: #e2e8f0; }
    .mode-btn.active {
      border-color: #facc15;
      background: rgba(234, 179, 8, 0.15);
      color: #fde047;
    }

    #speed-controls {
      display: flex;
      gap: 4px;
    }

    .speed-btn {
      padding: 4px 10px;
      border-radius: 5px;
      border: 1px solid #475569;
      background: rgba(15, 23, 42, 0.85);
      color: #94a3b8;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      min-width: 32px;
    }
    .speed-btn:hover { background: rgba(51, 65, 85, 0.9); color: #e2e8f0; }
    .speed-btn.active {
      border-color: #facc15;
      background: rgba(234, 179, 8, 0.15);
      color: #fde047;
    }
    .speed-btn[data-speed="0"].active {
      border-color: #f87171;
      background: rgba(239, 68, 68, 0.15);
      color: #fca5a5;
    }

    #info-panel {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 200px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 14px;
      z-index: 10;
      display: none;
    }
    #info-panel h3 {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    #info-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    #info-country { font-size: 14px; font-weight: 500; margin-bottom: 10px; }
    #info-panel .row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin-top: 4px;
      color: #cbd5e1;
    }
    #info-panel .row .k { color: #64748b; }
    #info-panel .attack {
      margin-top: 8px;
      font-size: 12px;
      color: #f87171;
      font-weight: 600;
    }
    #info-panel .upgrade {
      margin-top: 8px;
      font-size: 12px;
      color: #fde047;
    }
    #info-panel .bar {
      height: 4px;
      background: #1e293b;
      border-radius: 2px;
      margin-top: 3px;
      overflow: hidden;
    }
    #info-panel .bar > span {
      display: block;
      height: 100%;
      background: #fde047;
    }
    #info-panel .troop-bar > span { background: #22c55e; }
    #info-panel .upgrade-btn {
      display: block;
      width: 100%;
      margin-top: 10px;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #475569;
      background: rgba(30, 41, 59, 0.9);
      color: #e2e8f0;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
    }
    #info-panel .upgrade-btn:hover:not(:disabled) {
      background: rgba(51, 65, 85, 0.95);
      border-color: #facc15;
    }
    #info-panel .upgrade-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    #diplomacy-panel {
      position: absolute;
      top: 12px;
      right: 224px;
      width: 220px;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 14px;
      z-index: 10;
    }
    #diplomacy-panel h3 {
      font-size: 13px;
      color: #64748b;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .dip-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 0;
      border-top: 1px solid rgba(51, 65, 85, 0.5);
      font-size: 12px;
    }
    .dip-row:first-of-type { border-top: 0; }
    .dip-row .swatch {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex: 0 0 auto;
    }
    .dip-row .name { flex: 1; font-weight: 600; }
    .dip-row .status {
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 3px;
      letter-spacing: 0.05em;
    }
    .dip-row .status.peaceful { background: #1e293b; color: #94a3b8; }
    .dip-row .status.ally     { background: rgba(34,197,94,0.2);  color: #4ade80; }
    .dip-row .status.war      { background: rgba(239,68,68,0.2);  color: #f87171; }
    .dip-row .status.dead     { background: #0f172a; color: #475569; }
    .dip-row .actions {
      display: flex;
      gap: 4px;
      margin-top: 4px;
      flex: 0 0 auto;
    }
    .dip-row .actions button {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      border: 1px solid #475569;
      background: rgba(30,41,59,0.9);
      color: #e2e8f0;
      cursor: pointer;
    }
    .dip-row .actions button.accept { border-color: #4ade80; color: #4ade80; }
    .dip-row .actions button.reject { border-color: #f87171; color: #f87171; }
    .dip-row .actions button:hover { background: rgba(51,65,85,0.95); }
    .dip-row.full {
      flex-wrap: wrap;
    }
    .dip-row.full .actions {
      flex: 0 0 100%;
      justify-content: flex-end;
    }

    #tooltip {
      position: fixed;
      background: rgba(15, 23, 42, 0.92);
      border: 1px solid #334155;
      border-radius: 5px;
      padding: 5px 10px;
      font-size: 13px;
      pointer-events: none;
      display: none;
      z-index: 100;
      white-space: nowrap;
    }

    #hud {
      position: absolute;
      bottom: 8px;
      left: 12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 11px;
      color: #64748b;
      background: rgba(15, 23, 42, 0.7);
      padding: 4px 8px;
      border-radius: 4px;
      z-index: 10;
      pointer-events: none;
    }

    #victory {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      background: rgba(15, 23, 42, 0.85);
      color: #e2e8f0;
      z-index: 30;
    }
    #victory .label {
      font-size: 14px;
      color: #94a3b8;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    #victory .winner {
      font-size: 36px;
      font-weight: 700;
    }
    #victory .msg {
      font-size: 14px;
      color: #cbd5e1;
    }

    #start-screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background: #0f172a;
      z-index: 40;
    }
    #start-screen h1 {
      font-size: 32px;
      letter-spacing: 0.1em;
      color: #e2e8f0;
    }
    #start-screen p {
      color: #94a3b8;
      font-size: 14px;
    }
    #nation-grid {
      display: grid;
      grid-template-columns: repeat(3, 160px);
      gap: 12px;
    }
    .nation-btn {
      padding: 18px 12px;
      border-radius: 10px;
      border: 2px solid transparent;
      background: rgba(15, 23, 42, 0.6);
      color: #e2e8f0;
      cursor: pointer;
      transition: transform 0.1s, border-color 0.1s;
      text-align: center;
    }
    .nation-btn:hover { transform: translateY(-2px); }
    .nation-btn .swatch {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      margin: 0 auto 8px;
    }
    .nation-btn .nm { font-size: 16px; font-weight: 600; }
    .nation-btn .id { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 2px; }

    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #94a3b8;
      z-index: 20;
      background: #0f172a;
    }
  </style>
</head>
<body>
  <div id="map-container">
    <canvas id="map"></canvas>

    <div id="top-left-controls">

      <div id="speed-controls">
        <button class="speed-btn" data-speed="0" title="一時停止 [Space]">⏸</button>
        <button class="speed-btn active" data-speed="1" title="通常速度 [1]">1×</button>
        <button class="speed-btn" data-speed="2" title="2倍速 [2]">2×</button>
        <button class="speed-btn" data-speed="4" title="4倍速 [3]">4×</button>
      </div>
    </div>

    <div id="info-panel">
      <h3>選択中の州</h3>
      <div id="info-name">—</div>
      <div id="info-country">—</div>
      <div class="row"><span class="k">兵力</span><span id="info-troops">—</span></div>
      <div class="bar troop-bar"><span id="info-troops-bar" style="width:0%"></span></div>
      <div class="row"><span class="k">地形</span><span id="info-terrain">—</span></div>
      <div class="row"><span class="k">産業Lv</span><span id="info-industry">—</span></div>
      <div class="row"><span class="k">隣接</span><span id="info-neighbors">—</span></div>
      <div id="info-upgrade" class="upgrade" style="display:none;">
        <div>開発中… 残り <span id="info-upgrade-remain">—</span>s</div>
        <div class="bar"><span id="info-upgrade-bar" style="width:0%"></span></div>
      </div>
      <div id="info-attack" class="attack" style="display:none;">
        攻撃中: <span id="info-attacker">—</span>
      </div>
      <button id="info-upgrade-btn" class="upgrade-btn" style="display:none;" disabled>
        開発: <span id="info-upgrade-cost">—</span>g / <span id="info-upgrade-time">—</span>s
      </button>
    </div>

    <div id="diplomacy-panel" style="display:none;">
      <h3>外交</h3>
      <div id="diplomacy-rows"></div>
    </div>

    <div id="hud">—</div>

    <div id="victory">
      <div class="label">Victory</div>
      <div class="winner" id="victory-winner">—</div>
      <div class="msg" id="victory-msg">—</div>
    </div>

    <div id="loading" style="display:none;">地図を読み込み中…</div>

    <div id="start-screen">
      <h1>FrontWave</h1>
      <p>プレイする国を選択してください</p>
      <div id="nation-grid"></div>
    </div>
  </div>

  <div id="tooltip"></div>

  <script src="https://unpkg.com/d3@7/dist/d3.min.js"></script>
  <script type="module" src="./main.js"></script>
</body>
</html>
