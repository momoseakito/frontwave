# game-engine 州 ID → Natural Earth admin-1 (iso_3166_2) のマッピング
# build スクリプトでこのファイルを読み、対応する admin-1 をディゾルブして
# assets/europe-provinces.geojson を生成する。
#
# 各エントリの意味:
#   name:    UI 表示名 (日本語) — 既存温存
#   nation:  所属国 ID (emp/kgd/fed/rep/hol/dch または "neutral") — 既存温存
#   admin1:  Natural Earth の iso_3166_2 配列。複数なら dissolve される
#
# v2 (1900年代六大国体制マップ):
#   emp → ロシア帝国 (黄)
#   kgd → イベリア・フランス (濃青)
#   fed → 英北連合 (暗赤)
#   rep → ドイツ・オーストリア帝国 (オリーブ緑)
#   hol → エスターライヒッシェス・ライヒ／伊・墺南領 (金)
#   dch → オスマン・地中海連合 (紫)

# ============================================================
# 帝国 (emp) → Russian Empire: 13 州
# ============================================================
# emp_capital をモスクワ、周辺に欧州ロシアの州を放射状配置。
# 既存隣接: capital ↔ saxony/franconia/bavaria/austria/prussia
#           北海岸 brabant→mecklenburg→holstein
# 新地理:   capital(モスクワ) ↔ saxony(中央ロシア)/franconia(ヴォルガ)/
#           bavaria(南ロシア)/austria(コーカサス前線)/prussia(北西=ペテルブルク前線)
#           brabant→mecklenburg→holstein は北極海岸ライン

emp_capital:
  name: 皇帝都
  nation: emp
  admin1: ["RU-MOS", "RU-MOW"]          # Moscow city + Moskovskaya oblast

emp_saxony:
  name: ザクセン
  nation: emp
  admin1: ["RU-TUL", "RU-RYA", "RU-VLA", "RU-IVA", "RU-KLU", "RU-ORL"]
  # モスクワ南東隣接州: トゥーラ + リャザン + ウラジーミル + イヴァノヴォ + カルーガ + オリョール

emp_franconia:
  name: フランコニア
  nation: emp
  admin1: ["RU-NIZ", "RU-CU", "RU-MO", "RU-PNZ", "RU-ULY", "RU-TAM", "RU-LIP"]
  # ヴォルガ中流: ニジニ + チュヴァシ + モルドヴァ + ペンザ + ウリヤノフスク + タンボフ + リペツク

emp_bavaria:
  name: バイエルン
  nation: emp
  admin1: ["RU-SAR", "RU-VGG", "RU-KL", "RU-AST", "RU-ROS", "RU-STA"]
  # 南ロシア・カスピ前線: サラトフ + ヴォルゴグラード + カルムイク + アストラハン + ロストフ + スタヴロポリ

emp_austria:
