  nation: emp
  admin1: ["RU-KDA", "RU-AD", "RU-KC", "RU-KB", "RU-SE", "RU-IN", "RU-CE", "RU-DA"]
  # 北コーカサス前線 (公国 dch との接点): クラスノダール + アディゲ + カラチャイ + カバルダ + 北オセチア + イングーシ + チェチェン + ダゲスタン

emp_swabia:
