  nation: emp
  admin1: ["RU-BA", "RU-TA", "RU-SAM", "RU-ORE"]
  # 南ウラル: バシコルトスタン + タタールスタン + サマラ + オレンブルク

emp_westmark:
  name: 西辺境州
  nation: emp
  admin1: ["RU-BRY", "RU-SMO", "RU-KRS", "RU-BEL", "RU-VOR"]
  # 西ロシア国境 (ベラルーシ・ウクライナ側): ブリャンスク + スモレンスク + クルスク + ベルゴロド + ヴォロネジ

emp_prussia:
