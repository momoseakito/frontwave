# game-engine 州 ID → Natural Earth admin-1 (iso_3166_2) のマッピング
# build スクリプトでこのファイルを読み、対応する admin-1 をディゾルブして
# assets/europe-provinces.geojson を生成する。
#
# 各エントリの意味:
#   name:    UI 表示名 (日本語)
#   nation:  所属国 ID (emp/kgd/fed/rep/hol/dch または "neutral")
#   admin1:  Natural Earth の iso_3166_2 配列。複数なら dissolve される

# ============================================================
# 帝国 (emp): ドイツ + 一部周辺 13 州
# ============================================================
# emp_capital を中央 (DE-BE Berlin) に置き、放射状に隣接州を配置。
# 設計の隣接関係 (capital ↔ saxony/franconia/bavaria/austria/prussia) と
# 北海岸の brabant→mecklenburg→holstein のラインを優先。

emp_capital:
  name: 皇帝都
  nation: emp
  admin1: ["DE-BE", "DE-BB"]            # Berlin + Brandenburg (首都圏)

emp_saxony:
  name: ザクセン
  nation: emp
  admin1: ["DE-SN", "DE-ST"]            # Saxony + Saxony-Anhalt

emp_franconia:
  name: フランコニア
  nation: emp
  admin1: ["DE-TH", "DE-HE"]            # Thuringia + Hesse (中央南独)

emp_bavaria:
  name: バイエルン
  nation: emp
  admin1: ["DE-BY"]                     # Bavaria

emp_austria:
  name: オーストリア
  nation: emp
  admin1: ["AT-3", "AT-4", "AT-9"]      # Lower Austria + Upper Austria + Vienna

emp_swabia:
  name: シュヴァーベン
  nation: emp
  admin1: ["DE-BW"]                     # Baden-Württemberg

emp_westmark:
  name: 西辺境州
  nation: emp
  admin1: ["DE-RP", "DE-SL"]            # Rhineland-Palatinate + Saarland

emp_prussia:
  name: プロイセン
  nation: emp
  admin1: ["DE-NW"]                     # North Rhine-Westphalia
  # 注: 史実の東プロイセンではなく "帝国の東主要州" として NRW を割当。
  # 設計の隣接 (capital, saxony, pomerania, neu_baltic, fed_gothland) は
  # 隣接整合性チェックの後で要調整。

emp_pomerania:
  name: ポメラニア
  nation: emp
  admin1: ["DE-MV"]                     # Mecklenburg-Western Pomerania

emp_mecklenburg:
  name: メクレンブルク
  nation: emp
  admin1: ["DE-HH", "DE-HB"]            # Hamburg + Bremen (北独の港町)

emp_holstein:
  name: ホルシュタイン
  nation: emp
  admin1: ["DE-SH"]                     # Schleswig-Holstein

emp_brabant:
  name: ブラバント
  nation: emp
  admin1: ["DE-NI"]                     # Lower Saxony (北独の北海沿岸)

emp_carinthia:
  name: ケルンテン
  nation: emp
  admin1: ["AT-2", "AT-5", "AT-6", "AT-7", "AT-8"]
  # Carinthia + Salzburg + Styria + Tyrol + Vorarlberg (オーストリア南西部)

